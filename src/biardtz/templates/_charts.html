<!-- Search filter badge (shown when charts are filtered) -->
<div id="chart-search-badge" class="hidden mb-3">
    <span class="inline-flex items-center gap-1.5 px-3 py-1 text-sm font-medium rounded-full bg-emerald-100 text-emerald-700">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        Showing results for "<span id="chart-search-term"></span>"
        <button onclick="clearChartSearch()" class="ml-1 hover:text-emerald-900" title="Clear filter">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </span>
</div>

<!-- Period selector -->
<div class="flex gap-2 mb-4">
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-emerald-600 text-white" data-days="1" onclick="updateCharts(1, this)">Today</button>
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-stone-100 text-stone-600 hover:bg-stone-200" data-days="7" onclick="updateCharts(7, this)">7 days</button>
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-stone-100 text-stone-600 hover:bg-stone-200" data-days="30" onclick="updateCharts(30, this)">30 days</button>
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-stone-100 text-stone-600 hover:bg-stone-200" data-days="0" onclick="updateCharts(0, this)">All</button>
</div>

<!-- Detection timeline -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Detection Timeline</h3>
    <div class="relative" style="height: 220px;">
        <div class="chart-skeleton absolute inset-0 bg-stone-100 rounded animate-pulse"></div>
        <canvas id="chart-timeline"></canvas>
    </div>
</div>

<!-- Daily trend -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Daily Trend</h3>
    <div class="relative" style="height: 220px;">
        <div class="chart-skeleton absolute inset-0 bg-stone-100 rounded animate-pulse"></div>
        <canvas id="chart-trend"></canvas>
    </div>
</div>

<!-- Species frequency -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Top Species</h3>
    <div class="relative" style="height: 300px;">
        <div class="chart-skeleton absolute inset-0 bg-stone-100 rounded animate-pulse"></div>
        <canvas id="chart-species"></canvas>
    </div>
</div>

<!-- Activity heatmap -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Activity by Hour & Day</h3>
    <div id="heatmap-container" class="overflow-x-auto">
        <div class="chart-skeleton h-40 bg-stone-100 rounded animate-pulse"></div>
    </div>
</div>

<script>
(function() {
    var timelineChart = null;
    var speciesChart = null;
    var trendChart = null;
    var currentDays = 1;
    var currentSearch = '';
    var timelineSpeciesData = {};  // {hour: {species: count}}
    var heatmapSpeciesData = {};   // {"dow-hour": {species: count}}

    function hideSkeletons() {
        document.querySelectorAll('.chart-skeleton').forEach(function(el) { el.remove(); });
    }

    var chartColors = {
        emerald: 'rgba(16, 185, 129, 1)',
        emeraldBg: 'rgba(16, 185, 129, 0.15)',
        amber: 'rgba(245, 158, 11, 1)',
        amberBg: 'rgba(245, 158, 11, 0.15)',
    };

    function speciesToolTipTitle(items) {
        return items[0].label || '';
    }

    function timelineTooltipLabel(ctx) {
        var hour = ctx.label;
        // Look up species breakdown for this hour
        var breakdown = timelineSpeciesData[hour];
        if (breakdown) {
            var lines = [];
            var entries = Object.entries(breakdown).sort(function(a, b) { return b[1] - a[1]; });
            for (var i = 0; i < entries.length && i < 8; i++) {
                lines.push(entries[i][0] + ': ' + entries[i][1]);
            }
            if (entries.length > 8) {
                lines.push('... +' + (entries.length - 8) + ' more');
            }
            lines.push('Total: ' + ctx.parsed.y);
            return lines;
        }
        return 'Detections: ' + ctx.parsed.y;
    }

    function initTimeline(data) {
        var ctx = document.getElementById('chart-timeline');
        if (!ctx) return;
        if (timelineChart) timelineChart.destroy();

        timelineChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(function(d) { return d.hour; }),
                datasets: [{
                    label: 'Detections',
                    data: data.map(function(d) { return d.count; }),
                    borderColor: chartColors.emerald,
                    backgroundColor: chartColors.emeraldBg,
                    fill: true,
                    tension: 0.3,
                    pointRadius: data.length > 48 ? 0 : 3,
                    pointHoverRadius: 5,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: currentDays <= 1 ? 'hour' : 'day', tooltipFormat: currentDays <= 1 ? 'HH:mm' : 'dd MMM' },
                        grid: { display: false },
                        ticks: { maxTicksLimit: 8, font: { size: 11 } },
                    },
                    y: {
                        beginAtZero: true,
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { color: 'rgba(0,0,0,0.05)' },
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        padding: 8,
                        callbacks: {
                            label: timelineTooltipLabel
                        }
                    },
                },
            }
        });
    }

    function initSpecies(data) {
        var ctx = document.getElementById('chart-species');
        if (!ctx) return;
        if (speciesChart) speciesChart.destroy();

        speciesChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.map(function(d) { return d.common_name; }),
                datasets: [{
                    label: 'Detections',
                    data: data.map(function(d) { return d.count; }),
                    backgroundColor: chartColors.emeraldBg,
                    borderColor: chartColors.emerald,
                    borderWidth: 1,
                    borderRadius: 4,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                scales: {
                    x: {
                        beginAtZero: true,
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { color: 'rgba(0,0,0,0.05)' },
                    },
                    y: {
                        grid: { display: false },
                        ticks: { font: { size: 11 } },
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', padding: 8 },
                },
            }
        });
    }

    function initTrend(data) {
        var ctx = document.getElementById('chart-trend');
        if (!ctx) return;
        if (trendChart) trendChart.destroy();

        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(function(d) { return d.day; }),
                datasets: [{
                    label: 'Detections',
                    data: data.map(function(d) { return d.count; }),
                    borderColor: chartColors.emerald,
                    backgroundColor: chartColors.emeraldBg,
                    fill: true,
                    tension: 0.3,
                    yAxisID: 'y',
                }, {
                    label: 'Species',
                    data: data.map(function(d) { return d.species; }),
                    borderColor: chartColors.amber,
                    backgroundColor: 'transparent',
                    borderDash: [5, 3],
                    tension: 0.3,
                    pointRadius: 3,
                    yAxisID: 'y1',
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: 'day', tooltipFormat: 'dd MMM' },
                        grid: { display: false },
                        ticks: { maxTicksLimit: 8, font: { size: 11 } },
                    },
                    y: {
                        beginAtZero: true,
                        position: 'left',
                        title: { display: true, text: 'Detections', font: { size: 11 } },
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { color: 'rgba(0,0,0,0.05)' },
                    },
                    y1: {
                        beginAtZero: true,
                        position: 'right',
                        title: { display: true, text: 'Species', font: { size: 11 } },
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { display: false },
                    }
                },
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                    tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', padding: 8 },
                },
            }
        });
    }

    function initHeatmap(data) {
        var container = document.getElementById('heatmap-container');
        if (!container) return;

        var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        var grid = {};
        var maxCount = 0;
        data.forEach(function(d) {
            var key = d.dow + '-' + d.hour;
            grid[key] = d.count;
            if (d.count > maxCount) maxCount = d.count;
        });

        var html = '<div style="display:grid; grid-template-columns: 40px repeat(24, 1fr); gap:2px; min-width:400px;">';
        // Header row
        html += '<div></div>';
        for (var h = 0; h < 24; h++) {
            html += '<div class="text-center text-xs text-stone-400" style="font-size:9px;">' + (h < 10 ? '0' : '') + h + '</div>';
        }
        // Data rows
        for (var d = 0; d < 7; d++) {
            html += '<div class="text-xs text-stone-500 flex items-center">' + days[d] + '</div>';
            for (var h = 0; h < 24; h++) {
                var count = grid[d + '-' + h] || 0;
                var intensity = maxCount > 0 ? count / maxCount : 0;
                var bg;
                if (count === 0) {
                    bg = '#f5f5f4';
                } else if (intensity < 0.25) {
                    bg = '#d1fae5';
                } else if (intensity < 0.5) {
                    bg = '#6ee7b7';
                } else if (intensity < 0.75) {
                    bg = '#34d399';
                } else {
                    bg = '#059669';
                }
                // Build tooltip with species breakdown
                var tipKey = d + '-' + h;
                var tip = days[d] + ' ' + h + ':00 — ' + count + ' detections';
                var breakdown = heatmapSpeciesData[tipKey];
                if (breakdown) {
                    var entries = Object.entries(breakdown).sort(function(a, b) { return b[1] - a[1]; });
                    var speciesTip = entries.slice(0, 5).map(function(e) { return e[0] + ': ' + e[1]; }).join(', ');
                    if (entries.length > 5) speciesTip += ', +' + (entries.length - 5) + ' more';
                    tip += '\n' + speciesTip;
                }
                html += '<div style="background:' + bg + '; aspect-ratio:1; border-radius:2px;" title="' + tip.replace(/"/g, '&quot;') + '"></div>';
            }
        }
        html += '</div>';
        container.innerHTML = html;
    }

    function getSearchTerm() {
        // Find the visible search input (there are two — mobile and desktop)
        var inputs = document.querySelectorAll('input[name="search"]');
        var val = '';
        for (var i = 0; i < inputs.length; i++) {
            if (inputs[i].offsetParent !== null && inputs[i].value) {
                val = inputs[i].value.trim();
                break;
            }
        }
        // Fallback: check all inputs for any non-empty value
        if (!val) {
            for (var i = 0; i < inputs.length; i++) {
                if (inputs[i].value && inputs[i].value.trim()) {
                    val = inputs[i].value.trim();
                    break;
                }
            }
        }
        if (val !== currentSearch) {
            currentSearch = val;
            updateSearchBadge();
        }
        return currentSearch;
    }

    function searchParam() {
        var term = getSearchTerm();
        if (!term) return '';
        return '&search=' + encodeURIComponent(term);
    }

    function fetchCharts(days) {
        currentDays = days;
        var param = days > 0 ? '?days=' + days : '?days=3650';
        var sp = searchParam();
        var done = 0;
        var total = 6;  // 4 main charts + 2 breakdown endpoints
        function onDone() { if (++done >= total) hideSkeletons(); }

        // Main chart data
        fetch('/api/charts/timeline' + param + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { initTimeline(d); onDone(); });
        fetch('/api/charts/trend' + param + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { initTrend(d); onDone(); });
        fetch('/api/charts/species' + param + '&limit=15' + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { initSpecies(d); onDone(); });
        fetch('/api/charts/heatmap' + param + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { initHeatmap(d); onDone(); });

        // Species breakdown for tooltips
        fetch('/api/charts/timeline/species' + param + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { timelineSpeciesData = d; onDone(); });
        fetch('/api/charts/heatmap/species' + param + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { heatmapSpeciesData = d; onDone(); });
    }

    function updateSearchBadge() {
        var badge = document.getElementById('chart-search-badge');
        var term = document.getElementById('chart-search-term');
        if (currentSearch) {
            term.textContent = currentSearch;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }

    // Expose for period buttons
    window.updateCharts = function(days, btn) {
        document.querySelectorAll('.chart-period-btn').forEach(function(b) {
            b.className = b.className
                .replace('bg-emerald-600 text-white', '')
                .replace('bg-stone-100 text-stone-600 hover:bg-stone-200', '')
                .trim();
            b.classList.add('bg-stone-100', 'text-stone-600', 'hover:bg-stone-200');
        });
        btn.classList.remove('bg-stone-100', 'text-stone-600', 'hover:bg-stone-200');
        btn.classList.add('bg-emerald-600', 'text-white');
        fetchCharts(days);
    };

    // Expose for search integration
    window.updateChartSearch = function(searchTerm) {
        currentSearch = (searchTerm || '').trim();
        updateSearchBadge();
        fetchCharts(currentDays);
    };

    window.clearChartSearch = function() {
        currentSearch = '';
        updateSearchBadge();
        // Clear ALL search inputs (mobile + desktop) and trigger HTMX refresh
        document.querySelectorAll('input[name="search"]').forEach(function(el) {
            el.value = '';
            el.dispatchEvent(new Event('biardtz-search'));
        });
        fetchCharts(currentDays);
    };

    // Initial load
    fetchCharts(1);
})();
</script>
