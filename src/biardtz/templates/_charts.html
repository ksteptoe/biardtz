<!-- Period selector -->
<div class="flex gap-2 mb-4">
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-emerald-600 text-white" data-days="1" onclick="updateCharts(1, this)">Today</button>
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-stone-100 text-stone-600 hover:bg-stone-200" data-days="7" onclick="updateCharts(7, this)">7 days</button>
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-stone-100 text-stone-600 hover:bg-stone-200" data-days="30" onclick="updateCharts(30, this)">30 days</button>
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-stone-100 text-stone-600 hover:bg-stone-200" data-days="0" onclick="updateCharts(0, this)">All</button>
</div>

<!-- Detection timeline -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Detection Timeline</h3>
    <div class="relative" style="height: 220px;">
        <canvas id="chart-timeline"></canvas>
    </div>
</div>

<!-- Daily trend -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Daily Trend</h3>
    <div class="relative" style="height: 220px;">
        <canvas id="chart-trend"></canvas>
    </div>
</div>

<!-- Species frequency -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Top Species</h3>
    <div class="relative" style="height: 300px;">
        <canvas id="chart-species"></canvas>
    </div>
</div>

<!-- Activity heatmap -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Activity by Hour & Day</h3>
    <div id="heatmap-container" class="overflow-x-auto">
        <div class="text-center text-stone-400 text-sm py-4">Loading...</div>
    </div>
</div>

<script>
(function() {
    var timelineChart = null;
    var speciesChart = null;
    var trendChart = null;
    var currentDays = 1;

    var chartColors = {
        emerald: 'rgba(16, 185, 129, 1)',
        emeraldBg: 'rgba(16, 185, 129, 0.15)',
        amber: 'rgba(245, 158, 11, 1)',
        amberBg: 'rgba(245, 158, 11, 0.15)',
    };

    function initTimeline(data) {
        var ctx = document.getElementById('chart-timeline');
        if (!ctx) return;
        if (timelineChart) timelineChart.destroy();

        timelineChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(function(d) { return d.hour; }),
                datasets: [{
                    label: 'Detections',
                    data: data.map(function(d) { return d.count; }),
                    borderColor: chartColors.emerald,
                    backgroundColor: chartColors.emeraldBg,
                    fill: true,
                    tension: 0.3,
                    pointRadius: data.length > 48 ? 0 : 3,
                    pointHoverRadius: 5,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: currentDays <= 1 ? 'hour' : 'day', tooltipFormat: currentDays <= 1 ? 'HH:mm' : 'dd MMM' },
                        grid: { display: false },
                        ticks: { maxTicksLimit: 8, font: { size: 11 } },
                    },
                    y: {
                        beginAtZero: true,
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { color: 'rgba(0,0,0,0.05)' },
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', padding: 8 },
                },
            }
        });
    }

    function initSpecies(data) {
        var ctx = document.getElementById('chart-species');
        if (!ctx) return;
        if (speciesChart) speciesChart.destroy();

        speciesChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.map(function(d) { return d.common_name; }),
                datasets: [{
                    label: 'Detections',
                    data: data.map(function(d) { return d.count; }),
                    backgroundColor: chartColors.emeraldBg,
                    borderColor: chartColors.emerald,
                    borderWidth: 1,
                    borderRadius: 4,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                scales: {
                    x: {
                        beginAtZero: true,
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { color: 'rgba(0,0,0,0.05)' },
                    },
                    y: {
                        grid: { display: false },
                        ticks: { font: { size: 11 } },
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', padding: 8 },
                },
            }
        });
    }

    function initTrend(data) {
        var ctx = document.getElementById('chart-trend');
        if (!ctx) return;
        if (trendChart) trendChart.destroy();

        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(function(d) { return d.day; }),
                datasets: [{
                    label: 'Detections',
                    data: data.map(function(d) { return d.count; }),
                    borderColor: chartColors.emerald,
                    backgroundColor: chartColors.emeraldBg,
                    fill: true,
                    tension: 0.3,
                    yAxisID: 'y',
                }, {
                    label: 'Species',
                    data: data.map(function(d) { return d.species; }),
                    borderColor: chartColors.amber,
                    backgroundColor: 'transparent',
                    borderDash: [5, 3],
                    tension: 0.3,
                    pointRadius: 3,
                    yAxisID: 'y1',
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: 'day', tooltipFormat: 'dd MMM' },
                        grid: { display: false },
                        ticks: { maxTicksLimit: 8, font: { size: 11 } },
                    },
                    y: {
                        beginAtZero: true,
                        position: 'left',
                        title: { display: true, text: 'Detections', font: { size: 11 } },
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { color: 'rgba(0,0,0,0.05)' },
                    },
                    y1: {
                        beginAtZero: true,
                        position: 'right',
                        title: { display: true, text: 'Species', font: { size: 11 } },
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { display: false },
                    }
                },
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                    tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', padding: 8 },
                },
            }
        });
    }

    function initHeatmap(data) {
        var container = document.getElementById('heatmap-container');
        if (!container) return;

        var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        var grid = {};
        var maxCount = 0;
        data.forEach(function(d) {
            var key = d.dow + '-' + d.hour;
            grid[key] = d.count;
            if (d.count > maxCount) maxCount = d.count;
        });

        var html = '<div style="display:grid; grid-template-columns: 40px repeat(24, 1fr); gap:2px; min-width:400px;">';
        // Header row
        html += '<div></div>';
        for (var h = 0; h < 24; h++) {
            html += '<div class="text-center text-xs text-stone-400" style="font-size:9px;">' + (h < 10 ? '0' : '') + h + '</div>';
        }
        // Data rows
        for (var d = 0; d < 7; d++) {
            html += '<div class="text-xs text-stone-500 flex items-center">' + days[d] + '</div>';
            for (var h = 0; h < 24; h++) {
                var count = grid[d + '-' + h] || 0;
                var intensity = maxCount > 0 ? count / maxCount : 0;
                var bg;
                if (count === 0) {
                    bg = '#f5f5f4';
                } else if (intensity < 0.25) {
                    bg = '#d1fae5';
                } else if (intensity < 0.5) {
                    bg = '#6ee7b7';
                } else if (intensity < 0.75) {
                    bg = '#34d399';
                } else {
                    bg = '#059669';
                }
                html += '<div style="background:' + bg + '; aspect-ratio:1; border-radius:2px;" title="' + days[d] + ' ' + h + ':00 — ' + count + ' detections"></div>';
            }
        }
        html += '</div>';
        container.innerHTML = html;
    }

    function fetchCharts(days) {
        currentDays = days;
        var param = days > 0 ? '?days=' + days : '?days=3650';
        fetch('/api/charts/timeline' + param)
            .then(function(r) { return r.json(); })
            .then(initTimeline);
        fetch('/api/charts/trend' + param)
            .then(function(r) { return r.json(); })
            .then(initTrend);
        fetch('/api/charts/species' + param + '&limit=15')
            .then(function(r) { return r.json(); })
            .then(initSpecies);
        fetch('/api/charts/heatmap' + param)
            .then(function(r) { return r.json(); })
            .then(initHeatmap);
    }

    // Expose for period buttons
    window.updateCharts = function(days, btn) {
        document.querySelectorAll('.chart-period-btn').forEach(function(b) {
            b.className = b.className
                .replace('bg-emerald-600 text-white', '')
                .replace('bg-stone-100 text-stone-600 hover:bg-stone-200', '')
                .trim();
            b.classList.add('bg-stone-100', 'text-stone-600', 'hover:bg-stone-200');
        });
        btn.classList.remove('bg-stone-100', 'text-stone-600', 'hover:bg-stone-200');
        btn.classList.add('bg-emerald-600', 'text-white');
        fetchCharts(days);
    };

    // Initial load
    fetchCharts(1);
})();
</script>
