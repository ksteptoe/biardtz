<!-- Search filter badge (shown when charts are filtered) -->
<div id="chart-search-badge" class="hidden mb-3">
    <span class="inline-flex items-center gap-1.5 px-3 py-1 text-sm font-medium rounded-full bg-emerald-100 text-emerald-700">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        Showing results for "<span id="chart-search-term"></span>"
        <button onclick="clearChartSearch()" class="ml-1 hover:text-emerald-900" title="Clear filter">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </span>
</div>

<!-- Period selector -->
<div class="flex gap-2 mb-4">
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-emerald-600 text-white" data-days="1" onclick="updateCharts(1, this)">Today</button>
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-stone-100 text-stone-600 hover:bg-stone-200" data-days="7" onclick="updateCharts(7, this)">7 days</button>
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-stone-100 text-stone-600 hover:bg-stone-200" data-days="30" onclick="updateCharts(30, this)">30 days</button>
    <button class="chart-period-btn px-3 py-1.5 text-sm font-medium rounded-lg bg-stone-100 text-stone-600 hover:bg-stone-200" data-days="0" onclick="updateCharts(0, this)">All</button>
</div>

<!-- Chart drill-down panel (hidden until a chart point is clicked) -->
<div id="chart-drill-down" class="hidden mb-4">
    <div class="bg-white rounded-xl shadow-sm p-4">
        <div class="flex items-center justify-between mb-3">
            <h3 id="chart-drill-title" class="text-sm font-semibold text-stone-600"></h3>
            <button onclick="closeChartDrill()"
                    class="text-stone-400 hover:text-stone-600 transition p-1" title="Close">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        <div id="chart-drill-results"></div>
    </div>
</div>

<!-- Detection timeline -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Detection Timeline</h3>
    <div class="relative" style="height: 220px;">
        <div class="chart-skeleton absolute inset-0 bg-stone-100 rounded animate-pulse"></div>
        <canvas id="chart-timeline"></canvas>
    </div>
</div>

<!-- Daily trend -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Daily Trend</h3>
    <div class="relative" style="height: 220px;">
        <div class="chart-skeleton absolute inset-0 bg-stone-100 rounded animate-pulse"></div>
        <canvas id="chart-trend"></canvas>
    </div>
</div>

<!-- Species frequency -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Top Species</h3>
    <div class="relative" style="height: 300px;">
        <div class="chart-skeleton absolute inset-0 bg-stone-100 rounded animate-pulse"></div>
        <canvas id="chart-species"></canvas>
    </div>
</div>

<!-- Activity heatmap -->
<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
    <h3 class="text-sm font-semibold text-stone-600 mb-2">Activity by Hour & Day</h3>
    <div id="heatmap-container" class="overflow-x-auto">
        <div class="chart-skeleton h-40 bg-stone-100 rounded animate-pulse"></div>
    </div>
</div>

<script>
(function() {
    var timelineChart = null;
    var speciesChart = null;
    var trendChart = null;
    var currentDays = 1;
    var currentSearch = '';
    var timelineSpeciesData = {};
    var heatmapSpeciesData = {};
    // Store raw chart data for drill-down
    var timelineData = [];
    var speciesData = [];
    var trendData = [];

    function hideSkeletons() {
        document.querySelectorAll('.chart-skeleton').forEach(function(el) { el.remove(); });
    }

    var chartColors = {
        emerald: 'rgba(16, 185, 129, 1)',
        emeraldBg: 'rgba(16, 185, 129, 0.15)',
        amber: 'rgba(245, 158, 11, 1)',
        amberBg: 'rgba(245, 158, 11, 0.15)',
    };

    /* ── Drill-down ─────────────────────────────────────────────── */

    function chartDrill(title, params) {
        var panel = document.getElementById('chart-drill-down');
        var results = document.getElementById('chart-drill-results');
        document.getElementById('chart-drill-title').textContent = title;
        results.innerHTML = '<div class="text-center text-stone-400 py-8">Loading...</div>';
        panel.classList.remove('hidden');
        var sp = currentSearch ? '&search=' + encodeURIComponent(currentSearch) : '';
        fetch('/partials/detections?' + params + sp)
            .then(function(r) { return r.text(); })
            .then(function(html) {
                results.innerHTML = html;
                panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
    }

    window.closeChartDrill = function() {
        document.getElementById('chart-drill-down').classList.add('hidden');
        document.getElementById('chart-drill-results').innerHTML = '';
    };

    function onTimelineClick(evt, els) {
        if (!els.length) return;
        var idx = els[0].index;
        var item = timelineData[idx];
        if (!item) return;
        var hourStr = item.hour;
        var d = new Date(hourStr);
        var next = new Date(d.getTime() + 3600000);
        var params = 'limit=50&date_from=' + encodeURIComponent(hourStr)
            + '&date_to=' + encodeURIComponent(next.toISOString().slice(0, 19));
        var hh = hourStr.slice(11, 16);
        chartDrill('Detections at ' + hh, params);
    }

    function onSpeciesClick(evt, els) {
        if (!els.length) return;
        var idx = els[0].index;
        var item = speciesData[idx];
        if (!item) return;
        var params = 'limit=50&species=' + encodeURIComponent(item.common_name);
        chartDrill(item.common_name + ' — All Detections', params);
    }

    function onTrendClick(evt, els) {
        if (!els.length) return;
        var idx = els[0].index;
        var item = trendData[idx];
        if (!item) return;
        var dayStr = item.day;
        var nextDay = new Date(new Date(dayStr).getTime() + 86400000);
        var params = 'limit=50&date_from=' + encodeURIComponent(dayStr)
            + '&date_to=' + encodeURIComponent(nextDay.toISOString().slice(0, 10));
        chartDrill('Detections on ' + dayStr, params);
    }

    /* ── Tooltip helpers ────────────────────────────────────────── */

    function timelineTooltipLabel(ctx) {
        var hour = ctx.label;
        var breakdown = timelineSpeciesData[hour];
        if (breakdown) {
            var lines = [];
            var entries = Object.entries(breakdown).sort(function(a, b) { return b[1] - a[1]; });
            for (var i = 0; i < entries.length && i < 8; i++) {
                lines.push(entries[i][0] + ': ' + entries[i][1]);
            }
            if (entries.length > 8) {
                lines.push('... +' + (entries.length - 8) + ' more');
            }
            lines.push('Total: ' + ctx.parsed.y);
            return lines;
        }
        return 'Detections: ' + ctx.parsed.y;
    }

    function timelineTooltipFooter() {
        return 'Click for details';
    }

    /* ── Chart initialisers ─────────────────────────────────────── */

    function initTimeline(data) {
        timelineData = data;
        var ctx = document.getElementById('chart-timeline');
        if (!ctx) return;
        if (timelineChart) timelineChart.destroy();

        timelineChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(function(d) { return d.hour; }),
                datasets: [{
                    label: 'Detections',
                    data: data.map(function(d) { return d.count; }),
                    borderColor: chartColors.emerald,
                    backgroundColor: chartColors.emeraldBg,
                    fill: true,
                    tension: 0.3,
                    pointRadius: data.length > 48 ? 0 : 3,
                    pointHoverRadius: 5,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: currentDays <= 1 ? 'hour' : 'day', tooltipFormat: currentDays <= 1 ? 'HH:mm' : 'dd MMM' },
                        grid: { display: false },
                        ticks: { maxTicksLimit: 8, font: { size: 11 } },
                    },
                    y: {
                        beginAtZero: true,
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { color: 'rgba(0,0,0,0.05)' },
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        padding: 8,
                        callbacks: {
                            label: timelineTooltipLabel,
                            footer: timelineTooltipFooter
                        },
                        footerFont: { style: 'italic', size: 10 },
                        footerColor: 'rgba(255,255,255,0.6)',
                    },
                },
                onClick: onTimelineClick,
                onHover: function(evt, els) {
                    evt.native.target.style.cursor = els.length ? 'pointer' : 'default';
                },
            }
        });
    }

    function initSpecies(data) {
        speciesData = data;
        var ctx = document.getElementById('chart-species');
        if (!ctx) return;
        if (speciesChart) speciesChart.destroy();

        speciesChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: data.map(function(d) { return d.common_name; }),
                datasets: [{
                    label: 'Detections',
                    data: data.map(function(d) { return d.count; }),
                    backgroundColor: chartColors.emeraldBg,
                    borderColor: chartColors.emerald,
                    borderWidth: 1,
                    borderRadius: 4,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                scales: {
                    x: {
                        beginAtZero: true,
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { color: 'rgba(0,0,0,0.05)' },
                    },
                    y: {
                        grid: { display: false },
                        ticks: { font: { size: 11 } },
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        padding: 8,
                        callbacks: {
                            footer: function() { return 'Click for details'; }
                        },
                        footerFont: { style: 'italic', size: 10 },
                        footerColor: 'rgba(255,255,255,0.6)',
                    },
                },
                onClick: onSpeciesClick,
                onHover: function(evt, els) {
                    evt.native.target.style.cursor = els.length ? 'pointer' : 'default';
                },
            }
        });
    }

    function initTrend(data) {
        trendData = data;
        var ctx = document.getElementById('chart-trend');
        if (!ctx) return;
        if (trendChart) trendChart.destroy();

        trendChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.map(function(d) { return d.day; }),
                datasets: [{
                    label: 'Detections',
                    data: data.map(function(d) { return d.count; }),
                    borderColor: chartColors.emerald,
                    backgroundColor: chartColors.emeraldBg,
                    fill: true,
                    tension: 0.3,
                    yAxisID: 'y',
                }, {
                    label: 'Species',
                    data: data.map(function(d) { return d.species; }),
                    borderColor: chartColors.amber,
                    backgroundColor: 'transparent',
                    borderDash: [5, 3],
                    tension: 0.3,
                    pointRadius: 3,
                    yAxisID: 'y1',
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                scales: {
                    x: {
                        type: 'time',
                        time: { unit: 'day', tooltipFormat: 'dd MMM' },
                        grid: { display: false },
                        ticks: { maxTicksLimit: 8, font: { size: 11 } },
                    },
                    y: {
                        beginAtZero: true,
                        position: 'left',
                        title: { display: true, text: 'Detections', font: { size: 11 } },
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { color: 'rgba(0,0,0,0.05)' },
                    },
                    y1: {
                        beginAtZero: true,
                        position: 'right',
                        title: { display: true, text: 'Species', font: { size: 11 } },
                        ticks: { precision: 0, font: { size: 11 } },
                        grid: { display: false },
                    }
                },
                plugins: {
                    legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } },
                    tooltip: {
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        padding: 8,
                        callbacks: {
                            footer: function() { return 'Click for details'; }
                        },
                        footerFont: { style: 'italic', size: 10 },
                        footerColor: 'rgba(255,255,255,0.6)',
                    },
                },
                onClick: onTrendClick,
                onHover: function(evt, els) {
                    evt.native.target.style.cursor = els.length ? 'pointer' : 'default';
                },
            }
        });
    }

    function initHeatmap(data) {
        var container = document.getElementById('heatmap-container');
        if (!container) return;

        var days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        var grid = {};
        var maxCount = 0;
        data.forEach(function(d) {
            var key = d.dow + '-' + d.hour;
            grid[key] = d.count;
            if (d.count > maxCount) maxCount = d.count;
        });

        var html = '<div style="display:grid; grid-template-columns: 40px repeat(24, 1fr); gap:2px; min-width:400px;">';
        html += '<div></div>';
        for (var h = 0; h < 24; h++) {
            html += '<div class="text-center text-xs text-stone-400" style="font-size:9px;">' + (h < 10 ? '0' : '') + h + '</div>';
        }
        for (var d = 0; d < 7; d++) {
            html += '<div class="text-xs text-stone-500 flex items-center">' + days[d] + '</div>';
            for (var h = 0; h < 24; h++) {
                var count = grid[d + '-' + h] || 0;
                var intensity = maxCount > 0 ? count / maxCount : 0;
                var bg;
                if (count === 0) {
                    bg = '#f5f5f4';
                } else if (intensity < 0.25) {
                    bg = '#d1fae5';
                } else if (intensity < 0.5) {
                    bg = '#6ee7b7';
                } else if (intensity < 0.75) {
                    bg = '#34d399';
                } else {
                    bg = '#059669';
                }
                var tipKey = d + '-' + h;
                var tip = days[d] + ' ' + h + ':00 — ' + count + ' detections';
                var breakdown = heatmapSpeciesData[tipKey];
                if (breakdown) {
                    var entries = Object.entries(breakdown).sort(function(a, b) { return b[1] - a[1]; });
                    var speciesTip = entries.slice(0, 5).map(function(e) { return e[0] + ': ' + e[1]; }).join(', ');
                    if (entries.length > 5) speciesTip += ', +' + (entries.length - 5) + ' more';
                    tip += '\n' + speciesTip;
                }
                html += '<div style="background:' + bg + '; aspect-ratio:1; border-radius:2px; cursor:' + (count > 0 ? 'pointer' : 'default') + ';" title="' + tip.replace(/"/g, '&quot;') + '"'
                    + (count > 0 ? ' onclick="heatmapDrill(' + d + ',' + h + ')"' : '')
                    + '></div>';
            }
        }
        html += '</div>';
        container.innerHTML = html;
    }

    // Heatmap cell click drill-down (exposed globally for onclick)
    window.heatmapDrill = function(dow, hour) {
        var days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        var hh = String(hour).padStart(2, '0');
        // We can't filter by day-of-week via the detections API directly,
        // so show the hour for all days in the period
        var title = days[dow] + ' at ' + hh + ':00';
        // Use the heatmap species data to list what was detected
        var tipKey = dow + '-' + hour;
        var breakdown = heatmapSpeciesData[tipKey];
        if (breakdown) {
            var species = Object.keys(breakdown);
            if (species.length === 1) {
                chartDrill(title + ' — ' + species[0], 'limit=50&species=' + encodeURIComponent(species[0]));
            } else {
                // Show all matching species via search
                chartDrill(title + ' (' + Object.values(breakdown).reduce(function(a,b){return a+b;},0) + ' detections)', 'limit=50');
            }
        }
    };

    /* ── Search helpers ─────────────────────────────────────────── */

    function getSearchTerm() {
        var inputs = document.querySelectorAll('input[name="search"]');
        var val = '';
        for (var i = 0; i < inputs.length; i++) {
            if (inputs[i].offsetParent !== null && inputs[i].value) {
                val = inputs[i].value.trim();
                break;
            }
        }
        if (!val) {
            for (var i = 0; i < inputs.length; i++) {
                if (inputs[i].value && inputs[i].value.trim()) {
                    val = inputs[i].value.trim();
                    break;
                }
            }
        }
        if (val !== currentSearch) {
            currentSearch = val;
            updateSearchBadge();
        }
        return currentSearch;
    }

    function searchParam() {
        var term = getSearchTerm();
        if (!term) return '';
        return '&search=' + encodeURIComponent(term);
    }

    function fetchCharts(days) {
        currentDays = days;
        closeChartDrill();
        var param = days > 0 ? '?days=' + days : '?days=3650';
        var sp = searchParam();
        var done = 0;
        var total = 6;
        function onDone() { if (++done >= total) hideSkeletons(); }

        fetch('/api/charts/timeline' + param + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { initTimeline(d); onDone(); });
        fetch('/api/charts/trend' + param + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { initTrend(d); onDone(); });
        fetch('/api/charts/species' + param + '&limit=15' + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { initSpecies(d); onDone(); });
        fetch('/api/charts/heatmap' + param + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { initHeatmap(d); onDone(); });
        fetch('/api/charts/timeline/species' + param + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { timelineSpeciesData = d; onDone(); });
        fetch('/api/charts/heatmap/species' + param + sp)
            .then(function(r) { return r.json(); })
            .then(function(d) { heatmapSpeciesData = d; onDone(); });
    }

    function updateSearchBadge() {
        var badge = document.getElementById('chart-search-badge');
        var term = document.getElementById('chart-search-term');
        if (currentSearch) {
            term.textContent = currentSearch;
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }

    window.updateCharts = function(days, btn) {
        document.querySelectorAll('.chart-period-btn').forEach(function(b) {
            b.className = b.className
                .replace('bg-emerald-600 text-white', '')
                .replace('bg-stone-100 text-stone-600 hover:bg-stone-200', '')
                .trim();
            b.classList.add('bg-stone-100', 'text-stone-600', 'hover:bg-stone-200');
        });
        btn.classList.remove('bg-stone-100', 'text-stone-600', 'hover:bg-stone-200');
        btn.classList.add('bg-emerald-600', 'text-white');
        fetchCharts(days);
    };

    window.updateChartSearch = function(searchTerm) {
        currentSearch = (searchTerm || '').trim();
        updateSearchBadge();
        fetchCharts(currentDays);
    };

    window.clearChartSearch = function() {
        currentSearch = '';
        updateSearchBadge();
        document.querySelectorAll('input[name="search"]').forEach(function(el) {
            el.value = '';
            el.dispatchEvent(new Event('biardtz-search'));
        });
        // Also refresh leaderboard
        var statsPanel = document.getElementById('stats-panel');
        if (statsPanel) {
            htmx.ajax('GET', '/partials/stats', {target: '#stats-panel', swap: 'innerHTML'});
        }
        fetchCharts(currentDays);
    };

    fetchCharts(1);
})();
</script>
