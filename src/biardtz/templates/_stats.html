<div class="space-y-2">
{% for species in stats.leaderboard %}
<div class="flex items-center justify-between bg-white rounded-lg px-3 py-2 shadow-sm">
    <div class="flex items-center gap-2 min-w-0">
        <a href="https://en.wikipedia.org/wiki/{{ species.sci_name | replace(' ', '_') }}"
           target="_blank" rel="noopener">
            <img src="/api/image/{{ species.sci_name | urlencode }}"
                 class="w-8 h-8 rounded-full object-cover flex-shrink-0 bg-stone-100 hover:ring-2 hover:ring-emerald-400 transition"
                 loading="lazy"
                 onerror="this.src='/static/fallback-bird.svg'">
        </a>
        <span class="text-sm font-medium truncate">{{ species.common_name }}</span>
    </div>
    <span class="text-sm font-bold text-emerald-600 flex-shrink-0 ml-2">{{ species.count }}</span>
</div>
{% endfor %}

{% if not stats.leaderboard %}
<div class="text-center text-stone-400 py-8">
    <p class="text-sm">No species detected yet</p>
</div>
{% endif %}
</div>
