<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>biardtz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        .htmx-swapping { opacity: 0.5; transition: opacity 0.2s; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen">
    <header class="bg-emerald-700 text-white px-4 py-3 shadow-md">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <a href="/" class="no-underline text-white">
                <h1 class="text-xl font-bold tracking-wide">biardtz</h1>
                <p class="text-emerald-200 text-sm">{{ config.location_name }}</p>
            </a>
            <div class="flex items-center gap-3">
                <button id="conn-status" onclick="toggleHealthPanel()"
                     class="w-3 h-3 rounded-full bg-emerald-400 shadow-[0_0_6px_rgba(52,211,153,0.7)] transition-colors duration-300 cursor-pointer hover:scale-125"
                     title="Click for system health"></button>
                <div class="text-emerald-200 text-sm text-right">
                    <div>Bird Detection</div>
                    <div>Live Dashboard</div>
                </div>
            </div>
        </div>
    </header>
    {# Health panel drawer #}
    <div id="health-drawer"
         class="fixed top-0 right-0 h-full w-full sm:w-96 bg-stone-50 shadow-xl z-50 transform translate-x-full transition-transform duration-300 overflow-y-auto">
        <div id="health-content" class="p-4"></div>
    </div>
    <div id="health-backdrop"
         class="fixed inset-0 bg-black/20 z-40 hidden"
         onclick="toggleHealthPanel()"></div>

    <main class="max-w-5xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    <script>
    (function() {
        var dot = document.getElementById('conn-status');
        var base = 'w-3 h-3 rounded-full transition-colors duration-300 cursor-pointer hover:scale-125';
        var colors = {
            green:  base + ' bg-emerald-400 shadow-[0_0_6px_rgba(52,211,153,0.7)]',
            yellow: base + ' bg-amber-400 shadow-[0_0_6px_rgba(251,191,36,0.7)]',
            red:    base + ' bg-red-500 shadow-[0_0_6px_rgba(239,68,68,0.7)]'
        };
        function setDot(color) {
            dot.className = colors[color] || colors.green;
            dot.title = 'Click for system health';
        }
        // HTMX connection status
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            if (!evt.detail.successful) setDot('red');
        });
        document.body.addEventListener('htmx:sendError', function() { setDot('red'); });

        // Periodic health poll every 30s
        setInterval(function() {
            fetch('/api/health/quick').then(function(r) { return r.json(); })
                .then(function(d) { setDot(d.color); })
                .catch(function() { setDot('red'); });
        }, 30000);
    })();

    function toggleHealthPanel() {
        var drawer = document.getElementById('health-drawer');
        var backdrop = document.getElementById('health-backdrop');
        var open = !drawer.classList.contains('translate-x-full');
        if (open) {
            drawer.classList.add('translate-x-full');
            backdrop.classList.add('hidden');
        } else {
            drawer.classList.remove('translate-x-full');
            backdrop.classList.remove('hidden');
            htmx.ajax('GET', '/partials/health', {target: '#health-content', swap: 'innerHTML'});
        }
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
