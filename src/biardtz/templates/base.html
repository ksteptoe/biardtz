<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>biardtz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        .htmx-swapping { opacity: 0.5; transition: opacity 0.2s; }
    </style>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen">
    <header class="bg-emerald-700 text-white px-4 py-3 shadow-md">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <a href="/" class="no-underline text-white">
                <h1 class="text-xl font-bold tracking-wide">biardtz</h1>
                <p class="text-emerald-200 text-sm">{{ config.location_name }}</p>
            </a>
            <div class="flex items-center gap-3">
                <div id="conn-status"
                     class="w-3 h-3 rounded-full bg-emerald-400 shadow-[0_0_6px_rgba(52,211,153,0.7)] transition-colors duration-300"
                     title="Connected"></div>
                <div class="text-emerald-200 text-sm text-right">
                    <div>Bird Detection</div>
                    <div>Live Dashboard</div>
                </div>
            </div>
        </div>
    </header>
    <main class="max-w-5xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
    <script>
    (function() {
        var dot = document.getElementById('conn-status');
        function setOk() {
            dot.className = 'w-3 h-3 rounded-full bg-emerald-400 shadow-[0_0_6px_rgba(52,211,153,0.7)] transition-colors duration-300';
            dot.title = 'Connected';
        }
        function setErr() {
            dot.className = 'w-3 h-3 rounded-full bg-red-500 shadow-[0_0_6px_rgba(239,68,68,0.7)] transition-colors duration-300';
            dot.title = 'Disconnected';
        }
        document.body.addEventListener('htmx:afterRequest', function(evt) {
            if (evt.detail.successful) { setOk(); } else { setErr(); }
        });
        document.body.addEventListener('htmx:sendError', function() { setErr(); });
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
