{% extends "base.html" %}
{% block content %}

<!-- Summary cards -->
<div class="grid grid-cols-3 gap-4 mb-6">
    <div class="bg-white rounded-xl shadow p-4 text-center">
        <div class="text-3xl font-bold text-emerald-600">{{ stats.today_count }}</div>
        <div class="text-sm text-stone-500">Today</div>
    </div>
    <div class="bg-white rounded-xl shadow p-4 text-center">
        <div class="text-3xl font-bold text-amber-600">{{ stats.today_species }}</div>
        <div class="text-sm text-stone-500">Species Today</div>
    </div>
    <div class="bg-white rounded-xl shadow p-4 text-center">
        <div class="text-3xl font-bold text-sky-600">{{ stats.all_time_species }}</div>
        <div class="text-sm text-stone-500">All Time</div>
    </div>
</div>

<!-- Two-column layout -->
<div class="grid md:grid-cols-3 gap-6">
    <!-- Recent detections (left 2/3) -->
    <div class="md:col-span-2">
        <h2 class="text-lg font-semibold mb-3">Recent Detections</h2>
        <div id="detections-list"
             hx-get="/partials/detections"
             hx-trigger="every 5s"
             hx-swap="innerHTML transition:true">
            {% include "_detections.html" %}
        </div>
    </div>

    <!-- Leaderboard (right 1/3) -->
    <div>
        <h2 class="text-lg font-semibold mb-3">Species Leaderboard</h2>
        <div id="stats-panel"
             hx-get="/partials/stats"
             hx-trigger="every 30s"
             hx-swap="innerHTML">
            {% include "_stats.html" %}
        </div>
    </div>
</div>

{% endblock %}
