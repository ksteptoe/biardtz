<form id="filters" class="bg-white rounded-xl shadow-sm p-3 mb-4"
      onsubmit="return false;">
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3">
        <!-- Search -->
        <div class="sm:col-span-2 md:col-span-1">
            <input type="search" name="search" placeholder="Search birds... (Enter for * ? [a-h])"
                   value="{{ filters.search or '' }}"
                   class="w-full px-3 py-2 text-sm border border-stone-200 rounded-lg
                          focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent"
                   hx-get="/partials/detections"
                   hx-target="#detection-results"
                   hx-include="#filters"
                   hx-trigger="biardtz-search"
                   hx-swap="innerHTML transition:true"
                   onkeyup="window._biardtzSearchKey(this, event)"
                   oninput="window._biardtzSearchInput(this)">
        </div>

        <!-- Confidence slider -->
        <div>
            <div class="flex items-center gap-2">
                <input type="range" name="min_confidence" min="0" max="100" step="5"
                       value="{{ ((filters.min_confidence or 0) * 100) | int }}"
                       class="flex-1 h-2 accent-emerald-600"
                       hx-get="/partials/detections"
                       hx-target="#detection-results"
                       hx-include="#filters"
                       hx-trigger="change"
                       hx-swap="innerHTML transition:true"
                       oninput="this.nextElementSibling.textContent = this.value + '%'">
                <span class="text-xs text-stone-500 w-8 text-right">{{ ((filters.min_confidence or 0) * 100) | int }}%</span>
            </div>
            <div class="text-xs text-stone-400 mt-0.5">Min confidence</div>
        </div>

        <!-- Date from -->
        <div>
            <input type="date" name="date_from"
                   value="{{ filters.date_from or '' }}"
                   class="w-full px-3 py-2 text-sm border border-stone-200 rounded-lg
                          focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent"
                   hx-get="/partials/detections"
                   hx-target="#detection-results"
                   hx-include="#filters"
                   hx-trigger="change"
                   hx-swap="innerHTML transition:true">
            <div class="text-xs text-stone-400 mt-0.5">From</div>
        </div>

        <!-- Date to -->
        <div>
            <input type="date" name="date_to"
                   value="{{ filters.date_to or '' }}"
                   class="w-full px-3 py-2 text-sm border border-stone-200 rounded-lg
                          focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent"
                   hx-get="/partials/detections"
                   hx-target="#detection-results"
                   hx-include="#filters"
                   hx-trigger="change"
                   hx-swap="innerHTML transition:true">
            <div class="text-xs text-stone-400 mt-0.5">To</div>
        </div>
    </div>
</form>
<script>
(function() {
    var globRe = /[*?\[\]]/;
    var debounceTimer = null;

    function fireSearch(el) {
        // Update detection list via HTMX
        el.dispatchEvent(new Event('biardtz-search'));
        // Update all charts with the search term
        if (window.updateChartSearch) window.updateChartSearch(el.value);
        // Refresh leaderboard with search filter
        var statsPanel = document.getElementById('stats-panel');
        if (statsPanel) {
            var searchParam = el.value ? '?search=' + encodeURIComponent(el.value.trim()) : '';
            htmx.ajax('GET', '/partials/stats' + searchParam, {target: '#stats-panel', swap: 'innerHTML'});
        }
    }

    // On each input: debounce for plain text, skip for glob (wait for Enter)
    window._biardtzSearchInput = function(el) {
        clearTimeout(debounceTimer);
        if (globRe.test(el.value)) return;
        debounceTimer = setTimeout(function() { fireSearch(el); }, 300);
    };

    // Enter always fires search; also prevent form submission side-effects
    window._biardtzSearchKey = function(el, evt) {
        if (evt.key === 'Enter') {
            evt.preventDefault();
            clearTimeout(debounceTimer);
            fireSearch(el);
        }
    };
})();
</script>
